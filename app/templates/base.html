<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Personal Finance Agent{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <script>
    (function () {
      var saved = localStorage.getItem('pf-theme');
      if (saved === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
      if (localStorage.getItem('nav-collapsed') === '1') {
        document.documentElement.classList.add('nav-collapsed');
      }
    })();
  </script>
</head>
<body>

<!-- SVG sprite: all icons defined once, used anywhere via <use href="#ic-..."> -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="ic-dashboard" viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zm0 11h7v7h-7v-7zM3 14h7v7H3v-7z"/></symbol>
  <symbol id="ic-periods" viewBox="0 0 24 24"><path d="M8 2v4M16 2v4M3 8h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></symbol>
  <symbol id="ic-journal" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15z"/></symbol>
  <symbol id="ic-statements" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></symbol>
  <symbol id="ic-accounts" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></symbol>
  <symbol id="ic-spark" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></symbol>
  <symbol id="ic-check" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></symbol>
  <symbol id="ic-back" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></symbol>
  <symbol id="ic-alert" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01"/></symbol>
  <symbol id="ic-file" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8"/></symbol>
  <symbol id="ic-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
  <symbol id="ic-brain" viewBox="0 0 24 24"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-2.66zM14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-2.66z"/></symbol>
  <symbol id="ic-lock" viewBox="0 0 24 24"><path d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM7 11V7a5 5 0 0 1 10 0v4"/></symbol>
  <symbol id="ic-upload" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></symbol>
  <symbol id="ic-trend-up" viewBox="0 0 24 24"><path d="M23 6l-9.5 9.5-5-5L1 18M17 6h6v6"/></symbol>
  <symbol id="ic-trend-down" viewBox="0 0 24 24"><path d="M23 18l-9.5-9.5-5 5L1 6M17 18h6v-6"/></symbol>
  <symbol id="ic-sun" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/></symbol>
  <symbol id="ic-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></symbol>
  <symbol id="ic-arrow-right" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></symbol>
  <symbol id="ic-chevron-right" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></symbol>
  <symbol id="ic-x" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></symbol>
  <symbol id="ic-trash" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></symbol>
</svg>

<nav class="sidebar">
  <!-- Logo -->
  <div class="sidebar-logo-wrap">
    <div class="sidebar-logo-icon">
      <svg width="15" height="15" class="icon" style="stroke:#05080f;stroke-width:2.2">
        <use href="#ic-spark"/>
      </svg>
    </div>
    <div class="nav-collapsible">
      <div class="sidebar-logo-text">Finance Agent</div>
      <div class="sidebar-logo-sub">Personal Ledger</div>
    </div>
  </div>

  <!-- Active period block (child templates may override) -->
  {% block sidebar_period %}
  <div class="sidebar-period">
    <a href="/periods" class="sidebar-period-inner">
      <div class="sidebar-period-eyebrow">Workflow</div>
      <div class="sidebar-period-label">View Periods</div>
    </a>
  </div>
  {% endblock %}

  <!-- Nav links -->
  <ul class="sidebar-nav">
    <li>
      <a href="/" class="nav-link {% if active_page == 'dashboard' %}nav-link--active{% endif %}" title="Dashboard">
        <svg width="15" height="15" class="icon"><use href="#ic-dashboard"/></svg>
        <span class="nav-collapsible">Dashboard</span>
      </a>
    </li>
    <li>
      <a href="/periods" class="nav-link {% if active_page in ['periods', 'journal'] %}nav-link--active{% endif %}" title="Workflow">
        <svg width="15" height="15" class="icon"><use href="#ic-periods"/></svg>
        <span class="nav-collapsible">Workflow</span>
      </a>
    </li>
    <li>
      <a href="/ledger" class="nav-link {% if active_page == 'ledger' %}nav-link--active{% endif %}" title="Ledger">
        <svg width="15" height="15" class="icon"><use href="#ic-journal"/></svg>
        <span class="nav-collapsible">Ledger</span>
      </a>
    </li>
    <li>
      <a href="/ledger/statements" class="nav-link {% if active_page == 'statements' %}nav-link--active{% endif %}" title="Statements">
        <svg width="15" height="15" class="icon"><use href="#ic-statements"/></svg>
        <span class="nav-collapsible">Statements</span>
      </a>
    </li>
    <li>
      <a href="/accounts" class="nav-link {% if active_page == 'accounts' %}nav-link--active{% endif %}" title="Accounts">
        <svg width="15" height="15" class="icon"><use href="#ic-accounts"/></svg>
        <span class="nav-collapsible">Accounts</span>
      </a>
    </li>
  </ul>

  <!-- Collapse toggle -->
  <div class="sidebar-collapse-wrap">
    <button id="sidebar-collapse-btn" class="nav-link sidebar-collapse-btn" aria-label="Collapse sidebar" title="Collapse sidebar">
      <svg width="15" height="15" class="icon sidebar-collapse-icon"><use href="#ic-chevron-right"/></svg>
      <span class="nav-collapsible">Collapse</span>
    </button>
  </div>

  <!-- Footer / theme toggle -->
  <div class="sidebar-footer">
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
      <svg width="14" height="14" class="icon theme-icon--light"><use href="#ic-moon"/></svg>
      <svg width="14" height="14" class="icon theme-icon--dark"><use href="#ic-sun"/></svg>
      <span class="theme-label--light nav-collapsible">Dark mode</span>
      <span class="theme-label--dark nav-collapsible">Light mode</span>
    </button>
    <div class="sidebar-version nav-collapsible">Finance Agent · v0.1</div>
  </div>
</nav>

<script>
  (function () {
    var themeBtn = document.getElementById('theme-toggle');
    themeBtn.addEventListener('click', function () {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      var next = isDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('pf-theme', next);
    });

    var collapseBtn = document.getElementById('sidebar-collapse-btn');
    collapseBtn.addEventListener('click', function () {
      var collapsed = document.documentElement.classList.toggle('nav-collapsed');
      localStorage.setItem('nav-collapsed', collapsed ? '1' : '0');
    });
  })();
</script>

<main class="main">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
